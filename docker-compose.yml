services:
  # 1. Database Service
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-ai_developer}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. FastAPI Application Service (Backend)
  api:
    build: .
    container_name: fastapi_app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy

  # 3. Streamlit Application Service (Frontend)
  frontend:
    build: ./frontend
    container_name: streamlit_app
    ports:
      - "8501:8501"
    environment:
      # Tell the frontend that it is running inside Docker
      DOCKER: "true"
    depends_on:
      - api

volumes:
  postgres_data:
